<body class="bg-mesh min-h-screen text-on-surface flex flex-col font-body-md text-body-md overflow-x-hidden">
<!-- Top Navigation Placeholder (Shell Suppressed per Task: Transactional Page) -->
<main class="flex-grow flex items-center justify-center px-margin-mobile md:px-margin-desktop py-12 relative">
<!-- Decorative Background Blurs -->
<div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary/10 blur-[120px] rounded-full pointer-events-none"></div>
<div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-tertiary/10 blur-[120px] rounded-full pointer-events-none"></div>
<div class="w-full max-w-2xl">
<!-- Glass Card Container -->
<div class="glass-panel rounded-xl overflow-hidden shadow-2xl shadow-primary/5 p-8 md:p-12 relative z-10">
<!-- Brand Header -->
<div class="text-center mb-10">
<h1 class="font-headline-lg text-headline-lg text-primary tracking-tight mb-2">CampusFlow</h1>
<p class="text-on-surface-variant font-label-md text-label-md uppercase tracking-widest">Create Academic Account</p>
</div>
<form class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
<!-- Full Name Field -->
<div class="col-span-1 md:col-span-2 space-y-2">
<label class="font-label-md text-label-md text-on-surface ml-1">Full Name</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-tertiary transition-colors">person</span>
<input class="w-full bg-surface-container-low/50 border border-white/10 rounded-lg py-3 pl-12 pr-4 text-on-surface focus:ring-2 focus:ring-tertiary/50 focus:border-tertiary bg-clip-padding backdrop-blur-md outline-none transition-all placeholder:text-outline/50" placeholder="Dr. Julian Sterling" type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="col-span-1 md:col-span-2 space-y-2">
<label class="font-label-md text-label-md text-on-surface ml-1">University Email</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-tertiary transition-colors">mail</span>
<input class="w-full bg-surface-container-low/50 border border-white/10 rounded-lg py-3 pl-12 pr-4 text-on-surface focus:ring-2 focus:ring-tertiary/50 focus:border-tertiary bg-clip-padding backdrop-blur-md outline-none transition-all placeholder:text-outline/50" placeholder="j.sterling@university.edu" type="email"/>
</div>
</div>
<!-- Department Selection -->
<div class="col-span-1 space-y-2">
<label class="font-label-md text-label-md text-on-surface ml-1">Department</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-tertiary transition-colors">apartment</span>
<select class="w-full bg-surface-container-low/50 border border-white/10 rounded-lg py-3 pl-12 pr-4 text-on-surface appearance-none focus:ring-2 focus:ring-tertiary/50 focus:border-tertiary bg-clip-padding backdrop-blur-md outline-none transition-all">
<option>Computer Science</option>
<option>Architecture &amp; Design</option>
<option>Quantum Physics</option>
<option>Business Analytics</option>
</select>
</div>
</div>
<!-- Role Selection -->
<div class="col-span-1 space-y-2">
<label class="font-label-md text-label-md text-on-surface ml-1">Role Selection</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-tertiary transition-colors">supervised_user_circle</span>
<select class="w-full bg-surface-container-low/50 border border-white/10 rounded-lg py-3 pl-12 pr-4 text-on-surface appearance-none focus:ring-2 focus:ring-tertiary/50 focus:border-tertiary bg-clip-padding backdrop-blur-md outline-none transition-all">
<option>Student</option>
<option>Faculty</option>
<option>Admin</option>
</select>
</div>
</div>
<!-- Password Field -->
<div class="col-span-1 space-y-2">
<label class="font-label-md text-label-md text-on-surface ml-1">Password</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-tertiary transition-colors">lock</span>
<input class="w-full bg-surface-container-low/50 border border-white/10 rounded-lg py-3 pl-12 pr-4 text-on-surface focus:ring-2 focus:ring-tertiary/50 focus:border-tertiary bg-clip-padding backdrop-blur-md outline-none transition-all placeholder:text-outline/50" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Confirm Password Field -->
<div class="col-span-1 space-y-2">
<label class="font-label-md text-label-md text-on-surface ml-1">Confirm Password</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-tertiary transition-colors">verified_user</span>
<input class="w-full bg-surface-container-low/50 border border-white/10 rounded-lg py-3 pl-12 pr-4 text-on-surface focus:ring-2 focus:ring-tertiary/50 focus:border-tertiary bg-clip-padding backdrop-blur-md outline-none transition-all placeholder:text-outline/50" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Action Button -->
<div class="col-span-1 md:col-span-2 pt-6">
<button class="w-full bg-tertiary text-on-tertiary font-headline-md text-headline-md py-4 rounded-lg shadow-lg shadow-tertiary/20 hover:shadow-tertiary/40 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-3" type="submit">
<span>Create Account</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
<!-- Redirect to Login -->
<div class="col-span-1 md:col-span-2 text-center pt-4">
<p class="text-on-surface-variant">Already have an account? <a class="text-primary hover:text-primary-fixed-dim font-semibold transition-colors" href="#">Sign In</a></p>
</div>
</form>

<div class="flex justify-center gap-2 mt-8">
<div class="h-1.5 w-12 rounded-full bg-tertiary"></div>
<div class="h-1.5 w-12 rounded-full bg-surface-variant"></div>

<span class="text-label-md font-label-md text-on-surface-variant">Joined by 4,000+ Students</span>

</div>

<footer class="py-6 px-margin-mobile text-center">
<a class="inline-flex items-center gap-2 text-outline hover:text-on-surface transition-colors font-label-md text-label-md" href="#">
<span class="material-symbols-outlined text-[18px]">help_center</span>
            Need assistance with registration?
        </a>
